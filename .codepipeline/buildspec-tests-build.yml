version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12

  pre_build:
    commands:
      - export REPORT_GROUP_NAME="functional-test-report-$ENVIRONMENT-$TENANT"

      - cd $CODEBUILD_SRC_DIR
      - VENV_TESTS='/venv/eas-tests'
      - python3.12 -m venv $VENV_TESTS
      - . $VENV_TESTS/bin/activate
      - chmod +x environment.sh
      - . ./environment.sh
      - make bootstrap

  build:
    on-failure: CONTINUE
    commands:
      - export CI=true # Switch to headless mode
      - |
        if [ "$ENABLE_CBC_INTEGRATION_TESTS" = "false" ]; then
          export DISABLED_TEST_SUITES="cbc_integration"
          echo "DISABLING TEST SUITE 'cbc_integration'..."
        fi

      - make test; exit 0
      - echo "Test run finished."
      - python3.12 ./scripts/report-test-results.py functional-test-reports

  post_build:
    commands:
      - python3.12 ./scripts/signal-build-pass-or-fail.py $(pwd) report.xml

artifacts:
  files:
    - functional-test-reports/*
    - functional-test-traces/**/*

reports:
  $REPORT_GROUP_NAME:
    files:
      - "*.xml"
    base-directory: functional-test-reports
    discard-paths: yes
    file-format: JUNITXML
